<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
     <style>
      .container
          {

              background-color: rgb(48, 216, 146);
              height: 1200px;
              width: 1800px;




          }
          
       .box
          {

             background-color: rgb(92, 211, 226);
             height: 200px;
             width: 300px;
             margin: 5px;
             animation-name: nkanimation;
             animation-duration: 8s;
             animation-delay: 2s;
             animation-iteration-count: 100;
             animation-timing-function:linear;
             animation-direction: alternate;
             position : relative;
          }

       .box1
           {

            background-color:white;
             height: 40px;
             width: 50px;
             margin: 5px;
             animation-name: buluanimation;
             animation-duration: 2s;
             animation-delay: 1s;
             animation-direction: alternate;
             animation-timing-function:linear;
             animation-iteration-count: 100;
             position : relative;
             color:red;
             text-shadow: 2px 2px 4px green ;
             margin: 0%;
             padding: 0%;
          }
       .box2
           {

            background-color:white;
             height: 40px;
             width: 50px;
             margin: 5px;
             animation-name: naruanimation;
             animation-duration: 2s;
             animation-delay: 1s;
             animation-direction: alternate;
             animation-timing-function:linear;
             animation-iteration-count: 100;
             position : relative;
             color:red;
             text-shadow: 2px 2px 4px green ;
             margin: 0%;
             padding: 0%;
             
          }






              

       @keyframes nkanimation

       {

          from
            {  
               top: 0px;
               left:0px;

            }
        
          to
          {
              top:0px;
              left: 700px;


          }
         }  
           
    @keyframes buluanimation

{

   from
     {  
        top: 0px;
        left:0px;

     }
 
   to
   {
       top:0px;
       left: 250px;


   }
    

     }
 
     @keyframes naruanimation

{

   from
     {  
        top: 70px;
        left:250px;

     }
 
   to
   {
       top:70px;
       left:0px;


   }
    

     }
 

    </style>






</head>
<body>
    <div class=" container">               

        <div class = "box">         

            <div class="box1"> BULU</div>
            <div class="box2"> NARU</div>
        </div>

    </div>




</body>
</html>
